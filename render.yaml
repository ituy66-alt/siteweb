services:
  - type: web
    name: flux-store
    runtime: node
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true
      - key: INTERNAL_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/flux.db
    disk:
      name: flux-data
      mountPath: /var/data
      sizeGB: 1
